# Optional, non-gating AI code review. Posts a single pinned DeepSeek review
# comment per PR. Requires the `DEEPSEEK_API_KEY` repo secret; model and limits
# are overridable via the `DEEPSEEK_MODEL` / `DEEPSEEK_MAX_TOKENS` /
# `DEEPSEEK_MAX_DIFF` repo variables. Fork PRs (no secret) skip cleanly.

name: deepseek-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  deepseek-review:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@deepseek'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Gate on DEEPSEEK_API_KEY (fork PRs skip cleanly)
        id: gate
        run: |
          if [ -z "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::DEEPSEEK_API_KEY is not available (likely a fork PR). Skipping DeepSeek review."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run DeepSeek code review
        if: steps.gate.outputs.skip != 'true'
        uses: actions/github-script@v8
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          DEEPSEEK_MAX_TOKENS: ${{ vars.DEEPSEEK_MAX_TOKENS }}
          DEEPSEEK_MAX_DIFF: ${{ vars.DEEPSEEK_MAX_DIFF }}
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const title = pr.data.title;
            const body = pr.data.body || '';

            const diffResponse = await github.request({
              method: 'GET',
              url: `/repos/${owner}/${repo}/pulls/${prNumber}`,
              headers: { Accept: 'application/vnd.github.v3.diff' }
            });

            const diffText = typeof diffResponse.data === 'string'
              ? diffResponse.data
              : JSON.stringify(diffResponse.data);

            if (!diffText || diffText.length === 0) {
              console.log('No diff found - skipping review');
              return 'No diff to review.';
            }

            // deepseek-v4-pro has a ~1M-token window, so don't truncate real
            // PRs. Default to 2,000,000 chars (~600k tokens) — comfortably
            // inside the window even after reserving the 65k-token output
            // budget, so no realistic PR is cut. The remaining ceiling exists
            // only so a pathological multi-MB diff (lockfiles, generated files)
            // can't overflow the context and hard-fail the API call; raise or
            // remove it via the DEEPSEEK_MAX_DIFF repo var.
            const MAX_DIFF = parseInt(process.env.DEEPSEEK_MAX_DIFF || '2000000', 10);
            const truncatedDiff = diffText.length > MAX_DIFF
              ? diffText.substring(0, MAX_DIFF) + '\n\n... (diff truncated)'
              : diffText;

            const systemPrompt = `You are a senior software engineer performing a code review on the Heed monorepo.

            Heed is an open, Taiko-native messaging protocol: a wallet inbox that AI agents pay to reach. A sender pays the recipient's fee (in ETH, on-chain) to deliver a structured, signed envelope; the fee gates spam and flows directly to the recipient. No native token, no governance, no bridges. The repo contains:
            - Solidity 0.8.27 contracts (Foundry) in contracts/: Heed.sol — a UUPS-upgradeable (Initializable + Ownable2StepUpgradeable + UUPSUpgradeable) pay-to-reach inbox holding per-address encryption keys, per-recipient fee (capped by an immutable MAX_FEE_GWEI in implementation bytecode), trust lists, and delegate registration; IHeed.sol interface; Foundry tests + invariant tests + Deploy script
            - TypeScript library @heed/core in core-lib/: envelope schema/codec, EIP-712 per-field signing (envelope/sign), X25519 lockbox encryption (crypto/lockbox, crypto/key-derivation), IPFS pinning + gateway (ipfs/pinata, ipfs/gateway), payload encrypt/decrypt + CID, mail sources (source/rpc, source/indexer), and the on-chain write client (contract/client, contract/abi)
            - heed-cli in cli/: agent-side CLI (setup, send, inbox, agent identity, config, key) with a file/env keystore that holds the wallet + X25519 keys
            - React inbox SPA @heed/web in web/: wagmi/viem wallet gate, envelope rendering (EnvelopeCard / MailCard), compose/send, decryption hook, and self-asserted identity URI resolvers (erc8004, https)

            Provide a CONCISE code review in the following format. Skip sections that don't apply:

            ### 🔴 Critical Issues
            Issues that could lead to fund loss or theft, stuck/locked ETH, incorrect fee or refund accounting, signature/replay attacks, upgrade-storage corruption, key/identity spoofing, or leaking private keys / secrets.

            ### 🟡 Warnings
            Logic errors, missed edge cases, reentrancy/race conditions, or potential bugs that should be addressed.

            ### 🔵 Suggestions
            Performance improvements, style/convention fixes, better error handling, gas optimizations.

            ### 🟢 What Looks Good
            Notable correctness or design wins worth calling out. Skip if nothing stands out.

            ### Review Guidelines
            - **Solidity (Heed.sol)**: access control, reentrancy and checks-effects-interactions around the ETH transfers/refund in sendBatch and the funding call in registerDelegate, fee/refund arithmetic (gwei↔wei, atomic vs best-effort batch semantics, no value left stuck), FeeAboveCap enforcement against MAX_FEE_GWEI, key-nonce monotonicity in publishKey and the two-slot eviction logic, delegate EIP/ecrecover digest (chainid + contract address + clientId binding, malleability, replay/missing-nonce, ecrecover-to-zero), trust-list semantics
            - **Upgradeability**: UUPS storage-layout safety — preserve slot order, the __gap, and the immutable MAX_FEE_GWEI invariant (every implementation must deploy with the same cap); _authorizeUpgrade onlyOwner; initializer correctness and _disableInitializers in the constructor; Ownable2Step transfer flow
            - **Envelope / crypto (@heed/core)**: EIP-712 domain separation and per-field signature verification (the protocol only proves "the sending wallet authored this envelope" — name/owner_url/uri are self-asserted, never trust them as verified), X25519 lockbox key derivation and nonce reuse, payload encryption/decryption correctness, CID/content-ref integrity, gateway/IPFS handling
            - **CLI / web (TypeScript)**: keystore and private-key handling (never log/leak keys, safe file perms, env vs file keystore), viem/wagmi usage (correct chain id, signer scoping, value math), decryption flow, and that self-claimed identity fields are rendered as unverified
            - **Dependencies / supply chain**: flag new dependencies, especially crypto, RPC, and signing libs
            - Be direct and constructive. Don't be overly polite.
            - If there are no issues in a category, skip it entirely.`;

            const userPrompt = `## PR #${prNumber}: ${title}

            **Description:**
            ${body || 'No description provided.'}

            **Diff:**
            \`\`\`diff
            ${truncatedDiff}
            \`\`\`

            Review this PR thoroughly. Be direct - flag only real issues.`;

            // `deepseek-v4-pro` was returning 200 OK with empty content because the
            // 4096-token budget was consumed before any visible output. Keep the model
            // but raise the budget and retry below; both are overridable via repo vars.
            const model = process.env.DEEPSEEK_MODEL || 'deepseek-v4-pro';
            const maxTokens = parseInt(process.env.DEEPSEEK_MAX_TOKENS || String(8192 * 8), 10);

            async function requestReview() {
              const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify({
                  model,
                  messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userPrompt }
                  ],
                  max_tokens: maxTokens,
                  temperature: 0.3
                })
              });
              const data = await response.json();
              if (!response.ok) {
                throw new Error(`DeepSeek API error (${response.status}): ${JSON.stringify(data)}`);
              }
              const choice = data.choices && data.choices[0];
              return {
                reviewText: ((choice && choice.message && choice.message.content) || '').trim(),
                finishReason: (choice && choice.finish_reason) || 'unknown',
                usage: data.usage ? JSON.stringify(data.usage) : 'unknown'
              };
            }

            // Retry once on empty content (content filter / token budget exhausted
            // before the first token), then surface the outcome in the comment instead
            // of silently leaving the job green with no report.
            let { reviewText, finishReason, usage } = await requestReview();
            if (!reviewText) {
              core.warning(
                `DeepSeek returned no content (model=${model}, finish_reason=${finishReason}, usage=${usage}); retrying once.`
              );
              ({ reviewText, finishReason, usage } = await requestReview());
            }

            const triggerInfo = context.eventName === 'pull_request'
              ? 'Automatically triggered on PR update'
              : 'Triggered by `@deepseek` comment';
            const footer = `*${triggerInfo} • model: \`${model}\`*`;

            const commentBody = reviewText
              ? `## 🐋 DeepSeek Code Review\n\n${reviewText}\n\n---\n${footer}`
              : `## 🐋 DeepSeek Code Review\n\n⚠️ The model returned no review content after a retry `
                + `(model: \`${model}\`, finish_reason: \`${finishReason}\`, usage: \`${usage}\`). `
                + `This usually means the configured model id is invalid/aliased or the token budget was `
                + `exhausted before any visible output. Override via the \`DEEPSEEK_MODEL\` / `
                + `\`DEEPSEEK_MAX_TOKENS\` repo variables.\n\n---\n${footer}`;

            const comments = await github.rest.issues.listComments({
              owner, repo,
              issue_number: prNumber,
              per_page: 100
            });

            const existingComment = comments.data.find(c =>
              c.body.includes('🐋 DeepSeek Code Review') &&
              c.user.login === 'github-actions[bot]'
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existingComment.id,
                body: commentBody
              });
              console.log(`✅ Updated existing review comment #${existingComment.id}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: commentBody
              });
              console.log('✅ Posted new review comment');
            }

            return { success: true, reviewLength: reviewText.length };
