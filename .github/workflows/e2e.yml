# Branch protection on `main` requires the following job names verbatim:
#   e2e-protocol, e2e-web
# Renaming any job here without updating branch protection will silently drop the gate.

name: e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  e2e-protocol:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pin to a concrete tag so foundryup skips the unauthenticated
          # api.github.com/releases/latest call that periodically 403s.
          version: v1.7.1
      - name: Install dependencies (versions pinned in contracts/foundry.lock)
        working-directory: contracts
        run: |
          forge install --no-git --shallow \
            foundry-rs/forge-std@"$(jq -r '."lib/forge-std".tag.name' foundry.lock)" \
            OpenZeppelin/openzeppelin-contracts@"$(jq -r '."lib/openzeppelin-contracts".tag.name' foundry.lock)" \
            OpenZeppelin/openzeppelin-contracts-upgradeable@"$(jq -r '."lib/openzeppelin-contracts-upgradeable".tag.name' foundry.lock)"
      - run: npm ci
      - name: Run protocol round-trip
        env:
          KEEP_LOGS: "1"
        run: bash scripts/e2e.sh
      - name: Upload anvil log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: anvil-log
          path: /tmp/heed-anvil.*
          if-no-files-found: ignore

  e2e-web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build:core
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run Playwright e2e
        run: npm run test:e2e --workspace @heed/web
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore
