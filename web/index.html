<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- WalletConnect rotates subdomains under walletconnect.com, so connect-src/frame-src keep a wildcard there; every other origin is pinned. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https://rpc.mainnet.taiko.xyz https://gateway.pinata.cloud https://api.pinata.cloud https://ipfs.io https://cloudflare-ipfs.com https://*.walletconnect.com wss://*.walletconnect.com; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; frame-src 'self' https://*.walletconnect.com; base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;"
    />
    <title>Heed</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
